<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-4">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-600">Language Journal</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <textarea id="journalInput" rows="6" class="w-full p-3 border rounded mb-4 text-lg" placeholder="Write your journal here..."></textarea>
            <button id="processBtn" class="w-full bg-blue-600 text-white p-3 rounded text-lg font-semibold hover:bg-blue-700">Process & Extract Words</button>
        </div>

        <div id="result" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-bold mb-2">Polished Text:</h2>
            <p id="polishedText" class="mb-4 text-lg"></p>
            
            <h2 class="text-xl font-bold mb-2">Extracted Words:</h2>
            <div id="wordsList" class="grid grid-cols-2 gap-2"></div>
        </div>
    </div>

    <script>
        // ====================== 请确认你的 Supabase 信息 ======================
        const supabaseUrl = "https://gaacvbgquvavfbvusxqh.supabase.co";
        const supabaseAnonKey = "sb_publishable_l6T6pL8TWARzIwdSMOXYBQ_bZaHlDoa";
        // ======================================================================

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);
        let USER_ID = null;

        // 页面加载时自动初始化用户
        window.addEventListener('load', async () => {
            await initUserId();
            console.log("✅ 初始化完成，USER_ID:", USER_ID);
        });

        // 匿名登录 + 自动创建用户（修复版）
        async function initUserId() {
            try {
                const { data } = await supabaseClient.auth.signInAnonymously();
                if (data?.user) {
                    USER_ID = data.user.id;
                    localStorage.setItem('uid', USER_ID);
                    await createUserIfNotExists();
                    await checkUserPermission();
                    return;
                }

                USER_ID = localStorage.getItem('uid');
                if (!USER_ID) {
                    alert("Please refresh to initialize your account");
                }
            } catch (err) {
                console.error("❌ 初始化失败:", err);
                alert("Initialization error, please refresh.");
            }
        }

        // 自动创建用户（解决 users 表永远为空）
        async function createUserIfNotExists() {
            try {
                const { data: existing } = await supabaseClient
                    .from('users')
                    .select('id')
                    .eq('id', USER_ID)
                    .single();

                if (!existing) {
                    await supabaseClient.from('users').insert([{
                        id: USER_ID,
                        membership: 'free',
                        daily_used: 0,
                        last_date: '',
                        expiry_at: null
                    }]);
                    console.log("✅ 用户已创建到 users 表");
                }
            } catch (e) {
                console.error("❌ 创建用户失败:", e);
            }
        }

        // 权限检查（防崩溃）
        async function checkUserPermission() {
            if (!USER_ID) return;
            try {
                const { data: user } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', USER_ID)
                    .single();

                if (!user) return;

                const today = new Date().toISOString().split('T')[0];
                if (user.last_date !== today) {
                    await supabaseClient
                        .from('users')
                        .update({ last_date: today, daily_used: 0 })
                        .eq('id', USER_ID);
                }
            } catch (e) {
                console.error("❌ 权限检查错误:", e);
            }
        }

        // AI 处理按钮
        document.getElementById('processBtn').addEventListener('click', async () => {
            const btn = document.getElementById('processBtn');
            const text = document.getElementById('journalInput').value.trim();
            
            if (!text) {
                alert("Please enter your journal first!");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Processing...";

            try {
                const res = await fetch('/api/ai-process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const result = await res.json();

                if (result.success) {
                    document.getElementById('polishedText').textContent = result.polished_text;
                    const wordsList = document.getElementById('wordsList');
                    wordsList.innerHTML = '';

                    result.extracted_words.forEach(word => {
                        const div = document.createElement('div');
                        div.className = 'bg-gray-100 p-2 rounded text-center cursor-pointer hover:bg-blue-100';
                        div.textContent = word;
                        div.addEventListener('click', () => saveWord(word));
                        wordsList.appendChild(div);
                    });

                    document.getElementById('result').classList.remove('hidden');
                } else {
                    alert("Error: " + result.message);
                }
            } catch (err) {
                console.error(err);
                alert("Process failed!");
            } finally {
                btn.disabled = false;
                btn.textContent = "Process & Extract Words";
            }
        });

        // 保存单词到单词本
        async function saveWord(word) {
            if (!USER_ID) {
                alert("Please refresh to initialize your account");
                return;
            }

            try {
                await supabaseClient.from('user_words').insert([{
                    user_id: USER_ID,
                    word: word,
                    example: "",
                    language: "en"
                }]);
                alert("✅ " + word + " saved to your wordbook!");
            } catch (err) {
                console.error(err);
                alert("❌ Save failed");
            }
        }
    </script>
</body>
</html>
