<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Journal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .container-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .btn-process {
            background: #4318ff;
            color: white;
            border-radius: 0.75rem;
            padding: 1rem 2rem;
            font-weight: 600;
        }
        .btn-process:hover:not(:disabled) {
            background: #370fe0;
        }
        .btn-process:disabled {
            opacity: 0.7;
        }
        .btn-voice {
            background: #ff2d95;
            color: white;
            border-radius: 0.75rem;
            padding: 1rem 2rem;
            font-weight: 600;
        }
        .word-tag {
            background: #f3f4f6;
            border-radius: 0.5rem;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
        }
        .word-tag:hover {
            background: #e0e7ff;
        }
        .input-area {
            border: 1px solid #d1d5db;
            border-radius: 0.75rem;
            padding: 1rem;
            font-size: 1.125rem;
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="container-card mb-6">
            <h1 class="text-4xl font-bold mb-2">Language Journal AI</h1>
            <p class="text-gray-500 mb-6">Contact: lei20240000@gmail.com</p>
            
            <button id="pricingBtn" class="w-full border-2 border-gray-900 rounded-xl py-4 text-xl font-semibold mb-6 hover:bg-gray-50">
                View Pricing / Membership
            </button>

            <textarea id="journalInput" rows="6" class="input-area mb-4" placeholder="Write your journal here..."></textarea>
            
            <div class="flex gap-4">
                <button id="processBtn" class="btn-process flex-1 text-xl">Process & Extract Words</button>
                <button id="voiceBtn" class="btn-voice text-xl">Voice Input</button>
            </div>
        </div>

        <div id="result" class="container-card mb-6 hidden">
            <h2 class="text-2xl font-bold mb-4">Polished Text</h2>
            <p id="polishedText" class="text-lg leading-relaxed mb-8"></p>
            
            <h2 class="text-2xl font-bold mb-4">Extracted Words</h2>
            <div id="wordsList" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
        </div>

        <button id="wordbookBtn" class="w-full border-2 border-gray-900 rounded-xl py-4 text-xl font-semibold hover:bg-gray-50">
            My Wordbook
        </button>
    </div>

    <script>
        // ====================== 你的信息 ======================
        const SUPABASE_URL = "https://gaacvbgquvavfbvusxqh.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_l6T6pL8TWARzIwdSMOXYBQ_bZaHlDoa";
        // ======================================================

        // 修复重复定义错误！！！
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let USER_ID = null;

        window.addEventListener('load', async () => {
            await initUser();
        });

        async function initUser() {
            try {
                const { data } = await sbClient.auth.signInAnonymously();
                if (data?.user) {
                    USER_ID = data.user.id;
                    localStorage.setItem('uid', USER_ID);
                } else {
                    USER_ID = localStorage.getItem('uid');
                }

                if (!USER_ID) {
                    USER_ID = crypto.randomUUID();
                    localStorage.setItem('uid', USER_ID);
                }

                await createUser();
            } catch (e) {
                console.error("init error", e);
            }
        }

        async function createUser() {
            try {
                const { data } = await sbClient
                    .from('users')
                    .select('id')
                    .eq('id', USER_ID)
                    .single();

                if (!data) {
                    await sbClient.from('users').insert([{
                        id: USER_ID,
                        membership: 'free',
                        daily_used: 0,
                        last_date: ''
                    }]);
                    console.log("✅ 用户创建成功");
                }
            } catch (e) {}
        }

        // AI 按钮
        document.getElementById('processBtn').addEventListener('click', async () => {
            const btn = document.getElementById('processBtn');
            const text = document.getElementById('journalInput').value.trim();

            if (!text) return alert("Please enter content!");

            btn.disabled = true;
            btn.textContent = "Processing...";

            try {
                const res = await fetch('/api/ai-process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const result = await res.json();
                if (result.success) {
                    document.getElementById('polishedText').textContent = result.polished_text;
                    const list = document.getElementById('wordsList');
                    list.innerHTML = '';

                    result.extracted_words.forEach(word => {
                        const div = document.createElement('div');
                        div.className = 'word-tag';
                        div.textContent = word;
                        div.addEventListener('click', () => saveWord(word));
                        list.appendChild(div);
                    });

                    document.getElementById('result').classList.remove('hidden');
                }
            } catch (e) {
                alert("Process failed");
            } finally {
                btn.disabled = false;
                btn.textContent = "Process & Extract Words";
            }
        });

        async function saveWord(word) {
            try {
                await sbClient.from('user_words').insert([{
                    user_id: USER_ID,
                    word: word,
                    example: '',
                    language: 'en'
                }]);
                alert("✅ Saved: " + word);
            } catch (e) {
                alert("Save failed");
            }
        }

        document.getElementById('voiceBtn').onclick = () => alert("Coming soon");
        document.getElementById('pricingBtn').onclick = () => alert("Coming soon");
        document.getElementById('wordbookBtn').onclick = () => alert("Coming soon");
    </script>
</body>
</html>
