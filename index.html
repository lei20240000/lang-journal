<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Journal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 还原原版UI样式 */
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 2rem;
        }
        .btn-primary {
            background: #4f46e5;
            color: white;
            border-radius: 0.75rem;
            padding: 1rem 2rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }
        .btn-voice {
            background: #ec4899;
            color: white;
            border-radius: 0.75rem;
            padding: 1rem 2rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-voice:hover {
            background: #db2777;
            transform: translateY(-1px);
        }
        .word-tag {
            background: #f3f4f6;
            border-radius: 0.5rem;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .word-tag:hover {
            background: #e0e7ff;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- 顶部标题栏 -->
        <div class="card mb-6">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Language Journal AI</h1>
            <p class="text-gray-500 mb-6">Contact: lei20240000@gmail.com</p>
            
            <button id="pricingBtn" class="w-full border-2 border-gray-900 rounded-xl py-4 text-xl font-semibold mb-6 hover:bg-gray-50 transition">
                View Pricing / Membership
            </button>

            <textarea id="journalInput" rows="6" 
                class="w-full p-4 border-2 border-gray-200 rounded-xl text-lg mb-4 focus:border-indigo-500 focus:outline-none"
                placeholder="Write your journal here..."></textarea>
            
            <div class="flex gap-4">
                <button id="processBtn" class="btn-primary flex-1 text-xl">Process & Extract Words</button>
                <button id="voiceBtn" class="btn-voice text-xl">Voice Input</button>
            </div>
        </div>

        <!-- 结果展示区 -->
        <div id="result" class="card hidden mb-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">Polished Text</h2>
            <p id="polishedText" class="text-lg text-gray-700 mb-8 leading-relaxed"></p>
            
            <h2 class="text-2xl font-bold text-gray-900 mb-4">Extracted Words</h2>
            <div id="wordsList" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
        </div>

        <!-- 底部单词本入口 -->
        <button id="wordbookBtn" class="w-full border-2 border-gray-900 rounded-xl py-4 text-xl font-semibold hover:bg-gray-50 transition">
            My Wordbook
        </button>
    </div>

    <script>
        // ====================== 请替换为你的Supabase信息 ======================
        const supabaseUrl = "https://gaacvbgquvavfbvusxqh.supabase.co";
        const supabaseAnonKey = "sb_publishable_你的完整anon密钥";
        // ======================================================================

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);
        let USER_ID = null;

        // 页面加载自动初始化
        window.addEventListener('load', async () => {
            await initUserId();
            console.log("✅ 账号初始化完成，USER_ID:", USER_ID);
        });

        // 匿名登录+自动创建用户（修复版）
        async function initUserId() {
            try {
                const { data } = await supabaseClient.auth.signInAnonymously();
                if (data?.user) {
                    USER_ID = data.user.id;
                    localStorage.setItem('uid', USER_ID);
                    await createUserIfNotExists();
                    await checkUserPermission();
                    return;
                }

                USER_ID = localStorage.getItem('uid');
                if (!USER_ID) {
                    alert("Please refresh to initialize your account");
                }
            } catch (err) {
                console.error("❌ 初始化失败:", err);
                alert("Initialization error, please refresh.");
            }
        }

        // 自动创建用户（解决users表空）
        async function createUserIfNotExists() {
            try {
                const { data: existing } = await supabaseClient
                    .from('users')
                    .select('id')
                    .eq('id', USER_ID)
                    .single();

                if (!existing) {
                    await supabaseClient.from('users').insert([{
                        id: USER_ID,
                        membership: 'free',
                        daily_used: 0,
                        last_date: '',
                        expiry_at: null
                    }]);
                    console.log("✅ 用户已创建到users表");
                }
            } catch (e) {
                console.error("❌ 创建用户失败:", e);
            }
        }

        // 权限检查（防崩溃）
        async function checkUserPermission() {
            if (!USER_ID) return;
            try {
                const { data: user } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', USER_ID)
                    .single();

                if (!user) return;

                const today = new Date().toISOString().split('T')[0];
                if (user.last_date !== today) {
                    await supabaseClient
                        .from('users')
                        .update({ last_date: today, daily_used: 0 })
                        .eq('id', USER_ID);
                }
            } catch (e) {
                console.error("❌ 权限检查错误:", e);
            }
        }

        // AI处理按钮
        document.getElementById('processBtn').addEventListener('click', async () => {
            const btn = document.getElementById('processBtn');
            const text = document.getElementById('journalInput').value.trim();
            
            if (!text) {
                alert("Please enter your journal first!");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Processing...";

            try {
                const res = await fetch('/api/ai-process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const result = await res.json();

                if (result.success) {
                    document.getElementById('polishedText').textContent = result.polished_text;
                    const wordsList = document.getElementById('wordsList');
                    wordsList.innerHTML = '';

                    result.extracted_words.forEach(word => {
                        const div = document.createElement('div');
                        div.className = 'word-tag';
                        div.textContent = word;
                        div.addEventListener('click', () => saveWord(word));
                        wordsList.appendChild(div);
                    });

                    document.getElementById('result').classList.remove('hidden');
                } else {
                    alert("Error: " + result.message);
                }
            } catch (err) {
                console.error(err);
                alert("Process failed!");
            } finally {
                btn.disabled = false;
                btn.textContent = "Process & Extract Words";
            }
        });

        // 保存单词到单词本
        async function saveWord(word) {
            if (!USER_ID) {
                alert("Please refresh to initialize your account");
                return;
            }

            try {
                await supabaseClient.from('user_words').insert([{
                    user_id: USER_ID,
                    word: word,
                    example: "",
                    language: "en"
                }]);
                alert("✅ " + word + " saved to your wordbook!");
            } catch (err) {
                console.error(err);
                alert("❌ Save failed");
            }
        }

        // 语音输入按钮（占位）
        document.getElementById('voiceBtn').addEventListener('click', () => {
            alert("Voice input coming soon!");
        });

        // 会员页按钮（占位）
        document.getElementById('pricingBtn').addEventListener('click', () => {
            alert("Membership page coming soon!");
        });

        // 单词本按钮（占位）
        document.getElementById('wordbookBtn').addEventListener('click', () => {
            alert("Wordbook page coming soon!");
        });
    </script>

    <footer class="max-w-4xl mx-auto mt-12 pt-8 border-t border-gray-200 text-center text-gray-500">
        <p class="text-xl">© 2026 Language Journal AI</p>
        <p class="mt-2">Privacy Policy | Terms of Service</p>
    </footer>
</body>
</html>
